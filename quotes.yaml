# Safari Homepage - Theme-Specific Quotes
# Each theme has its own collection of quotes
# Quotes rotate randomly on page load and change when switching themes

themes:
  discworld:
    - text: "In the beginning there was nothing, which exploded."
      author: "Terry Pratchett"
    - text: "It's not worth doing something unless someone, somewhere, would much rather you weren't doing it."
      author: "Terry Pratchett"
    - text: "Real stupidity beats artificial intelligence every time."
      author: "Terry Pratchett"
    - text: "The truth may be out there, but the lies are inside your head."
      author: "Terry Pratchett"
    - text: "Multiple exclamation marks are a sure sign of a diseased mind."
      author: "Terry Pratchett"
    - text: "The trouble with having an open mind, of course, is that people will insist on coming along and trying to put things in it."
      author: "Terry Pratchett"
    - text: "It is well known that a vital ingredient of success is not knowing that what you're attempting can't be done."
      author: "Terry Pratchett"
    - text: "Build a man a fire, and he'll be warm for a day. Set a man on fire, and he'll be warm for the rest of his life."
      author: "Terry Pratchett"

  harrypotter:
    - text: "It does not do to dwell on dreams and forget to live, remember that."
      author: "Albus Dumbledore"
    - text: "To the well-organised mind, death is but the next great adventure."
      author: "Albus Dumbledore"
    - text: "It is our choices, Harry, that show what we truly are, far more than our abilities."
      author: "Albus Dumbledore"
    - text: "It matters not what someone is born, but what they grow to be!"
      author: "Albus Dumbledore"
    - text: "It is the unknown we fear when we look upon death and darkness, nothing more."
      author: "Albus Dumbledore"
    - text: "Happiness can be found even in the darkest of times, if one only remembers to turn on the light."
      author: "Albus Dumbledore"
    - text: "Words are, in my not-so-humble opinion, our most inexhaustible source of magic."
      author: "Albus Dumbledore"
    - text: "We must all face the choice between what is right and what is easy."
      author: "Albus Dumbledore"

  lotr:
    - text: "All we have to decide is what to do with the time that is given us."
      author: "Gandalf"
    - text: "Even the smallest person can change the course of the future."
      author: "Galadriel"
    - text: "All that is gold does not glitter, not all those who wander are lost."
      author: "Bilbo Baggins"
    - text: "I will not say: do not weep; for not all tears are an evil."
      author: "Gandalf"
    - text: "The road goes ever on and on, down from the door where it began."
      author: "Bilbo Baggins"
    - text: "It is not our part to master all the tides of the world, but to do what is in us."
      author: "Gandalf"
    - text: "Courage is found in unlikely places."
      author: "Gildor"
    - text: "There is some good in this world, and it's worth fighting for."
      author: "Samwise Gamgee"

  stormlight:
    - text: "The most important step a man can take. It's not the first one, is it? It's the next one."
      author: "Dalinar Kholin"
    - text: "You cannot have my pain."
      author: "Kaladin Stormblessed"
    - text: "Life before death. Strength before weakness. Journey before destination."
      author: "The First Ideal"
    - text: "The question is not whether you will love, hurt, dream, and die. It is what you will love, why you will hurt, when you will dream, and how you will die."
      author: "Wit"
    - text: "Somebody has to start. Somebody has to step forward and do what is right, because it is right."
      author: "Dalinar Kholin"
    - text: "Accept the pain, but don't accept that you deserved it."
      author: "Kaladin Stormblessed"
    - text: "Sometimes a hypocrite is nothing more than a man in the process of changing."
      author: "Dalinar Kholin"
    - text: "The purpose of a storyteller is not to tell you how to think, but to give you questions to think upon."
      author: "Brandon Sanderson"

  expanse:
    - text: "Every choice you've ever made has brought you here."
      author: "James Holden"
    - text: "The thing about being a monster is knowing when to stop."
      author: "Amos Burton"
    - text: "We are what we do."
      author: "James Holden"
    - text: "There are no sides. There's only what a man can do and what a man can't do."
      author: "Joe Miller"
    - text: "You can't take back what you do in a warship."
      author: "Chrisjen Avasarala"
    - text: "I am that guy."
      author: "Amos Burton"
    - text: "The stars are better off without us."
      author: "Joe Miller"
    - text: "Doors and corners, kid. That's where they get you."
      author: "Joe Miller"

  zen:
    - text: "You have power over your mind — not outside events. Realise this, and you will find strength."
      author: "Marcus Aurelius"
    - text: "Waste no more time arguing what a good man should be. Be one."
      author: "Marcus Aurelius"
    - text: "The impediment to action advances action. What stands in the way becomes the way."
      author: "Marcus Aurelius"
    - text: "Very little is needed to make a happy life; it is all within yourself, in your way of thinking."
      author: "Marcus Aurelius"
    - text: "He who fears death will never do anything worthy of a living man."
      author: "Seneca"
    - text: "We suffer more in imagination than in reality."
      author: "Seneca"
    - text: "Luck is what happens when preparation meets opportunity."
      author: "Seneca"
    - text: "Omnia aliena sunt, tempus tantum nostrum est. — All things are alien; time alone is ours."
      author: "Seneca"
    - text: "Make the best use of what is in your power, and take the rest as it happens."
      author: "Epictetus"
    - text: "It's not what happens to you, but how you react to it that matters."
      author: "Epictetus"
    - text: "First say to yourself what you would be; and then do what you have to do."
      author: "Epictetus"
    - text: "No man is free who is not master of himself."
      author: "Epictetus"
    - text: "Do not dwell in the past, do not dream of the future, concentrate the mind on the present moment."
      author: "Buddha"
    - text: "The mind is everything. What you think you become."
      author: "Buddha"
    - text: "Peace comes from within. Do not seek it without."
      author: "Buddha"
    - text: "Three things cannot be long hidden: the sun, the moon, and the truth."
      author: "Buddha"
    - text: "In the end, only three things matter: how much you loved, how gently you lived, and how gracefully you let go of things not meant for you."
      author: "Buddha"
    - text: "The only way to do great work is to love what you do."
      author: "Steve Jobs"
    - text: "Be yourself; everyone else is already taken."
      author: "Oscar Wilde"
