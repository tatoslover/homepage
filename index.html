<!doctype html>
<html lang="en" data-theme="zen">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Samuel Love — Personal Homepage" />
        <title>Good Morning, Samuel</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" type="image/svg+xml" href="assets/favicons/favicon.svg" />
        <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    </head>
    <body>
        <!-- ░░ BACKGROUND LAYER ░░ -->
        <div class="bg-layer" aria-hidden="true"></div>

        <!-- ░░ THEME SWITCHER ░░ -->
        <nav class="theme-switcher" aria-label="Theme selector">
            <button
                class="theme-trigger"
                aria-label="Change theme"
                aria-expanded="false"
                aria-haspopup="true"
            >
                🐢
            </button>
            <button
                class="theme-btn"
                data-theme="zen"
                aria-label="Zen underwater theme"
            >
                🌊
            </button>
            <button
                class="theme-btn"
                data-theme="discworld"
                aria-label="Discworld theme"
            >
                🐢
            </button>
            <button class="theme-btn" data-theme="lotr" aria-label="LOTR theme">
                💍
            </button>
            <button
                class="theme-btn"
                data-theme="expanse"
                aria-label="The Expanse theme"
            >
                🚀
            </button>
            <button
                class="theme-btn"
                data-theme="harrypotter"
                aria-label="Harry Potter theme"
            >
                ⚡
            </button>
            <button
                class="theme-btn"
                data-theme="stormlight"
                aria-label="Stormlight Archive theme"
            >
                🌩️
            </button>
        </nav>

        <!-- ░░ MAIN WRAPPER ░░ -->
        <main class="page-wrapper">
            <!-- ── INFO AT A GLANCE: clock, date, weather ── -->
            <section class="info-block glass" aria-label="Time and weather">
                <time
                    id="clock"
                    class="clock"
                    aria-live="polite"
                    aria-label="Current time"
                    >00:00</time
                >
                <p
                    id="date-display"
                    class="date-display"
                    aria-live="polite"
                ></p>
                <div
                    class="weather-inline"
                    id="weather-inline"
                    aria-label="Current weather in Christchurch"
                    aria-live="polite"
                    hidden
                >
                    <span
                        id="weather-icon"
                        class="weather-icon"
                        aria-hidden="true"
                    ></span>
                    <span id="weather-temp" class="weather-temp"></span>
                    <span class="weather-sep" aria-hidden="true">·</span>
                    <span id="weather-desc" class="weather-desc"></span>
                    <span class="weather-location" aria-hidden="true"
                        >Christchurch</span
                    >
                </div>
            </section>

            <!-- ── GREETING: personal message + quote ── -->
            <section class="greeting-block glass" aria-label="Greeting">
                <h1 id="greeting" class="greeting">Hello, Samuel.</h1>
                <p id="daily-quote" class="daily-quote"></p>
                <p id="quote-author" class="quote-author"></p>
            </section>

            <!-- ── LINK BROWSER ── -->
            <section class="link-browser glass" aria-label="Link browser">
                <h2 class="link-browser-title">Links</h2>

                <div class="link-browser-search">
                    <input
                        type="search"
                        id="link-browser-search"
                        class="link-search-input"
                        placeholder="Search links... (Option+L)"
                        aria-label="Search links"
                    />
                    <button
                        id="link-browser-toggle"
                        class="link-browser-toggle"
                        aria-label="Expand link browser"
                        aria-expanded="false"
                    >
                        <span class="toggle-icon">▼</span>
                    </button>
                </div>

                <div
                    id="link-browser-content"
                    class="link-browser-content"
                >
                    <div id="link-list" class="link-list">
                        <!-- Links will be rendered here -->
                    </div>
                </div>
            </section>

            <!-- ── DICTIONARY ── -->
            <section class="dictionary-section glass" aria-label="Dictionary">
                <header class="dictionary-header">
                    <h2 class="dictionary-title">Dictionary</h2>
                </header>

                <div class="dictionary-search">
                    <input
                        type="search"
                        id="dictionary-input"
                        class="dictionary-input"
                        placeholder="Look up a word... (Option+D)"
                        aria-label="Dictionary search"
                    />
                    <button
                        id="dictionary-search-btn"
                        class="dictionary-search-btn"
                        aria-label="Search"
                    >
                        Search
                    </button>
                </div>

                <div id="dictionary-results" class="dictionary-results" hidden>
                    <!-- Results will be inserted here -->
                </div>
            </section>

            <!-- ── CALENDAR ── -->
            <section class="cal-section" aria-labelledby="cal-heading">
                <div class="cal-top">
                    <h2 id="cal-heading" class="cal-title">Calendar</h2>
                </div>
                <div class="cal-progress-wrap">
                    <div
                        class="cal-progress-track"
                        role="progressbar"
                        aria-label="MTL year progress"
                        aria-valuemin="0"
                        aria-valuemax="100"
                        id="cal-progress-track"
                    >
                        <div class="cal-progress-fill" id="cal-progress-fill"></div>
                    </div>
                    <div class="cal-progress-months" id="cal-progress-months" aria-hidden="true"></div>
                </div>
                <div class="cal-columns">
                    <div class="cal-col">
                        <h3 class="cal-col-heading">Assignments</h3>
                        <ul class="cal-events" id="cal-academic-events" role="list"></ul>
                    </div>
                    <div class="cal-col">
                        <h3 class="cal-col-heading">Key Dates</h3>
                        <ul class="cal-events" id="cal-general-events" role="list"></ul>
                    </div>
                </div>
            </section>
        </main>
        <!-- /page-wrapper -->

        <!-- ░░ SCRIPTS ░░ -->
        <script src="script.js"></script>
    </body>
</html>
